<div class="container">
  @if (showPrevButton()) {
    <button
      class="size-s primary no-bg tab-arrow tab-prev prev-button"
      type="button"
      icon="ph-bold ph-caret-left"
      alg-button-icon
      (click)="onPrev()"
    ></button>
  }
  <ng-scrollbar
    class="alg-top-bar-scrollbar"
    [class.alg-content-tab-bar-scrollbar]="styleClass() !== 'for-header'"
    trackClass="alg-top-bar-scrollbar-no-track"
    orientation="horizontal"
    [sensorThrottleTime]="1"
    appearance="native"
    >
    <ul class="tabs" [class]="styleClass()" *ngrxLet="tabs$ as tabEntries">
      @for (entry of tabEntries; track entry.trackId) {
        @if (entry.kind === 'task-segment') {
          <li class="task-tabs-segment">
            <div class="task-tabs-segment-list" role="tablist">
              @for (tab of entry.tabs; track tab.id) {
                <a
                  class="task-tabs-segment-item"
                  [class.alg-tab-bar-active]="tab.isActive"
                  [routerLink]="tab.routerLink"
                  (click)="onChange(tab.id)"
                >{{ tab.label }}</a>
              }
            </div>
          </li>
        } @else {
          <li class="tabs-item" [class.alg-tab-bar-active]="entry.tab.isActive">
            <a class="tabs-item-link" [routerLink]="entry.tab.routerLink" (click)="onChange(entry.tab.id)">{{ entry.tab.label }}</a>
          </li>
        }
      }
    </ul>
  </ng-scrollbar>
  @if (showNextButton()) {
    <button
      class="size-s primary no-bg tab-arrow tab-next next-button"
      type="button"
      icon="ph-bold ph-caret-right"
      alg-button-icon
      (click)="onNext()"
    ></button>
  }
</div>
