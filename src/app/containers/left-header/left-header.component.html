@if (!compactMode()) {
  <div class="container" [class.expandable-layout]="hideTree()">
    <ng-container *ngrxLet="isNarrowScreen$; let isNarrowScreen">
      @if (hideTree()) {
        <div class="header-row">
          <div class="header-tab-column">
            <button
              class="left-menu"
              alg-button-icon
              type="button"
              icon="ph ph-list"
              data-cy="left-menu-btn"
              (click)="hideLeftMenu()"
            ></button>
          </div>
          <div class="header-content-column" [class.content-masked]="treeHidden()">
            <a class="link" [class.platform-name]="!leftHeaderLogoUrl" routerLink="/">
              @if (leftHeaderLogoUrl) {
                <img class="logo" [attr.src]="leftHeaderLogoUrl" [attr.alt]="title">
              } @else {
                {{ title }}
              }
            </a>
            @if (!!(showTopRightControls$ | async) && isNarrowScreen) {
              <alg-top-right-controls
                topRightMenuStyleClass="for-mobile"
              ></alg-top-right-controls>
            }
          </div>
        </div>
      } @else {
        <div class="left-section alg-flex-1" [ngClass]="{ 'for-mobile': isNarrowScreen }">
          <a class="link" [class.platform-name]="!leftHeaderLogoUrl" routerLink="/">
            @if (leftHeaderLogoUrl) {
              <img class="logo" [attr.src]="leftHeaderLogoUrl" [attr.alt]="title">
            } @else {
              {{ title }}
            }
          </a>
          <button
            class="left-menu"
            alg-button-icon
            type="button"
            icon="ph ph-list"
            data-cy="left-menu-btn"
            (click)="hideLeftMenu()"
          ></button>
        </div>
        @if (!!(showTopRightControls$ | async) && isNarrowScreen) {
          <alg-top-right-controls
            topRightMenuStyleClass="for-mobile"
          ></alg-top-right-controls>
        }
      }
    </ng-container>
  </div>
}
