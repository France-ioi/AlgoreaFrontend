@let secs = sections();

<form [formGroup]="form">
  @if (secs.global) {
    <alg-item-parameters-global [form]="form.controls.global"
      [textIdError]="textIdError()"
     />
  }
  @if (secs.score) {
    <alg-item-parameters-score [form]="form.controls.score" />
  }
  @if (secs.display.enabled) {
    <alg-item-parameters-display [form]="form.controls.display"
      [itemType]="itemData().item.type"
      [showChildrenLayout]="secs.display.showChildrenLayout"
      [showThumbnailUrl]="secs.display.showThumbnailUrl"
      [showDisableChildrenPrevNextNav]="secs.display.showDisableChildrenPrevNextNav"
      [showLeftNavIcon]="secs.display.showLeftNavIcon"
     />
  }
  @if (secs.participation) {
    <alg-item-parameters-participation [formControl]="form.controls.participation" />
  }
  @if (secs.team) {
    <alg-item-parameters-team [formControl]="form.controls.team" />
  }
</form>

<section class="owners-section">
  <h2 class="alg-h2 alg-text-normal title" i18n>Owners</h2>
  <alg-item-owners [itemId]="itemData().item.id" />
  <div class="delete-button">
    <alg-item-remove-button [itemData]="itemData()" (confirmRemoval)="confirmRemoval.emit()" />
  </div>
</section>
