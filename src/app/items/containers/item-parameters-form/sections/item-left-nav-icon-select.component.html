<div class="icon-grid" role="radiogroup" [attr.aria-labelledby]="labelId()">
  @for (choice of choices(); track choice.value; let idx = $index) {
    <button
      type="button"
      class="icon-cell"
      [class.selected]="isSelected(choice.value)"
      role="radio"
      [attr.aria-checked]="isSelected(choice.value)"
      [attr.aria-label]="choice.ariaLabel"
      [attr.tabindex]="isSelected(choice.value) ? 0 : -1"
      [id]="choiceId(idx)"
      (click)="select(choice.value)"
      (keydown)="onKeydown($event, idx)"
    >
      <i [class]="'ph ' + choice.iconClass"></i>
    </button>
  }
</div>
