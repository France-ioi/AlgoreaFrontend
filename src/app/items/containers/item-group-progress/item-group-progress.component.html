@if (state$ | async; as state) {
  @if (state.isReady) {
    @if (itemData(); as data) {
      <alg-group-progress-grid [itemData]="data"
        [group]="state.data"
       />
    }
  }
  @if (state.isFetching) {
    <alg-loading class="alg-flex-1" size="medium" />
  }
  @if (state.isError) {
    <alg-error class="alg-flex-1"
      i18n-message message="Error while loading the group progress"
      [showRefreshButton]="true"
      (refresh)="refresh()"
     />
  }
}
